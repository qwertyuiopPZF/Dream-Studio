<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Studio</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #f7f1e6 0%, #e8eef6 100%);
            color: #243043;
        }

        .panel {
            width: min(560px, 100%);
            padding: 32px 28px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(36, 48, 67, 0.08);
            box-shadow: 0 18px 45px rgba(36, 48, 67, 0.12);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 30px;
        }

        p {
            margin: 0 0 12px;
            line-height: 1.7;
        }

        code {
            padding: 2px 6px;
            border-radius: 6px;
            background: #f3f5f8;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h1>Dream Studio</h1>
        <p>这是 Dream Studio 后端服务的兜底页。</p>
        <p>当前开发拓扑为：前端站点运行在 <code>http://localhost:3000</code>，后端 API 运行在 <code>http://localhost:8080</code>。</p>
        <p>如果你要访问页面，请打开前端；如果你要检查服务状态，请访问后端接口或健康检查。</p>
    </div>
</body>
</html>
